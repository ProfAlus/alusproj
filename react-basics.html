<!doctype html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="/react-basics.js"></script>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      const button = <button>Hello Alus!</button>;
      const para = <p>I love Jesus. He is my Saviour!</p>;

      //We use div because it can hold multiple elements
      const div = (
        <div>
          <button>Hello Alus!</button>

          <p>I love Jesus. He is my Saviour!</p>
        </div>
      );

      const myContainer = document.querySelector(".js-container");

      ReactDOM.createRoot(myContainer).render(div);
    </script>
  </body>
</html>
