<!doctype html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="display-container"></div>
    <div class="product-card"></div>
    <!-- <script src="/react-basics.js"></script> -->
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      const div = (
        <div>
          <h3>Exercise 1</h3>
          <p> My name is Alusine</p>
        </div>
      );

      const cardDiv = (
        <div>
          <p> Cotton socks</p>
          <p> Price: $10</p>
          <button>Add to Cart</button>
        </div>
      );

      let productCost = parseInt(prompt("Enter Product Cost"));
      let shippingCost = parseInt(prompt("Enter Shipping Cost"));

      const totalCost = productCost + shippingCost;

      const orderDiv = (
        <div>
          <p>Product Cost ${productCost}</p>
          <p>Shipping Cost ${shippingCost}</p>
          <p>Total Cost ${totalCost}</p>
          <button>Place your order</button>
        </div>
      );

      const container = document.querySelector(".product-card");
      ReactDOM.createRoot(container).render(orderDiv);
    </script>
  </body>
</html>
